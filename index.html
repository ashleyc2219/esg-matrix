<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重大性矩陣圖產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2EE;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #DDD8D0;
    --text: #1A1714;
    --text-muted: #7A736B;
    --accent: #2B5240;
    --accent-light: #E8F0EC;
    --G: #4472C4;
    --E: #70AD47;
    --S: #ED7D31;
    --danger: #C0392B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: #fff;
    letter-spacing: 0.02em;
  }
  header span {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Layout ── */
  main {
    max-width: 860px;
    margin: 48px auto;
    padding: 0 24px;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: block;
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ── Step indicator ── */
  .steps {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
  }
  .step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 16px;
    left: 50%;
    width: 100%;
    height: 1px;
    background: var(--border);
  }
  .step-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    color: var(--text-muted);
    position: relative; z-index: 1;
    transition: all 0.3s;
  }
  .step.active .step-num {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .step.done .step-num {
    background: var(--E);
    border-color: var(--E);
    color: #fff;
  }
  .step-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    font-weight: 500;
  }
  .step.active .step-label { color: var(--accent); font-weight: 700; }

  /* ── Download template button ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    text-decoration: none;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
  }
  .btn-outline:hover { background: var(--accent-light); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #1e3d2e; }
  .btn-primary:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
  }
  .btn-download {
    background: var(--G);
    color: #fff;
    font-size: 15px;
    padding: 13px 28px;
  }
  .btn-download:hover { background: #2d5aad; }

  /* ── Format hint ── */
  .format-hint {
    background: var(--accent-light);
    border: 1px solid #C8DDD2;
    border-radius: 8px;
    padding: 16px 20px;
    font-size: 13px;
    line-height: 1.8;
    color: #2B5240;
    margin-top: 16px;
  }
  .format-hint strong { font-weight: 700; }
  .col-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .col-tag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid #C8DDD2;
    color: var(--accent);
  }

  /* ── Upload zone ── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 40px; margin-bottom: 12px; }
  .upload-zone p { font-size: 14px; color: var(--text-muted); }
  .upload-zone strong { color: var(--text); font-weight: 600; }
  .upload-zone.has-file { border-color: var(--E); background: #f0f8ec; }
  .file-name {
    display: none;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 8px;
  }

  /* ── Error ── */
  .error-box {
    display: none;
    background: #fdf2f2;
    border: 1px solid #f0c0bb;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    color: var(--danger);
    margin-top: 16px;
  }

  /* ── Generate button row ── */
  .action-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* ── Result section ── */
  #result-section { display: none; }
  .canvas-wrap {
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #fff;
    margin-bottom: 20px;
  }
  canvas { display: block; width: 100%; height: auto; }
  .result-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-meta { font-size: 13px; color: var(--text-muted); }

  /* ── Legend pills ── */
  .legend-pills { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
  .legend-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
  }
  .pill-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  /* ── Loading spinner ── */
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 32px;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>重大性矩陣圖產生器</h1>
    <span>Materiality Matrix Generator</span>
  </div>
</header>

<main>

  <!-- Steps -->
  <div class="steps">
    <div class="step active" id="step1">
      <div class="step-num">1</div>
      <div class="step-label">下載範本</div>
    </div>
    <div class="step" id="step2">
      <div class="step-num">2</div>
      <div class="step-label">上傳資料</div>
    </div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      <div class="step-label">產生圖表</div>
    </div>
    <div class="step" id="step4">
      <div class="step-num">4</div>
      <div class="step-label">下載 PNG</div>
    </div>
  </div>

  <!-- Step 1: Download template -->
  <div class="card">
    <div class="card-title">步驟一：下載 Excel 範本</div>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">
      請先下載範本檔案，依格式填入議題資料後再上傳。
    </p>
    <button class="btn btn-outline" onclick="downloadTemplate()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      下載 Excel 範本
    </button>
    <div class="format-hint">
      <strong>欄位說明（固定 30 筆，請勿增減列數）</strong>
      <div class="col-tags">
        <span class="col-tag">A 欄：議題名稱</span>
        <span class="col-tag">B 欄：面向（G / E / S）</span>
        <span class="col-tag">C 欄：衝擊程度（數字）</span>
        <span class="col-tag">D 欄：發生機率（正面為正數，負面為負數）</span>
      </div>
    </div>
  </div>

  <!-- Step 2: Upload -->
  <div class="card">
    <div class="card-title">步驟二：上傳填寫好的 Excel</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(this)">
      <div class="upload-icon">📊</div>
      <p><strong>點擊選擇檔案</strong>或拖曳至此</p>
      <p style="margin-top:4px;">支援 .xlsx / .xls</p>
      <div class="file-name" id="fileName"></div>
    </div>
    <div class="error-box" id="errorBox"></div>
    <div class="action-row">
      <button class="btn btn-primary" id="generateBtn" onclick="generateChart()" disabled>
        <div class="spinner" id="spinner"></div>
        <span id="generateLabel">產生矩陣圖</span>
      </button>
    </div>
  </div>

  <!-- Step 3+4: Result -->
  <div class="card" id="result-section">
    <div class="card-title">步驟三：預覽與下載</div>
    <div class="canvas-wrap">
      <canvas id="matrixCanvas"></canvas>
    </div>
    <div class="result-actions">
      <div>
        <div class="legend-pills">
          <div class="legend-pill"><div class="pill-dot" style="background:var(--G)"></div>G 治理／經濟</div>
          <div class="legend-pill"><div class="pill-dot" style="background:var(--E)"></div>E 環境</div>
          <div class="legend-pill"><div class="pill-dot" style="background:var(--S)"></div>S 社會</div>
        </div>
        <div class="result-meta" id="resultMeta" style="margin-top:8px;"></div>
      </div>
      <button class="btn btn-download" onclick="downloadPNG()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下載 PNG
      </button>
    </div>
  </div>

</main>

<footer>重大性矩陣圖產生器 &nbsp;·&nbsp; 僅供內部使用</footer>

<script>
// ── Globals ──────────────────────────────────────────────────────────────────
let parsedData = null;

// ── Template download ─────────────────────────────────────────────────────────
function downloadTemplate() {
  const wb = XLSX.utils.book_new();
  const headers = ['議題', '面向', '衝擊程度', '發生機率'];
  const sample = [
    ['公司治理與董事會運作完善','G',2.73,2.82],
    ['消費者個資與隱私保護','G',2.45,2.18],
    ['品牌責任與消費者溝通','G',2.82,2.55],
    ['提升營運與財務績效','G',2.82,2.64],
    ['誠信經營不當或舞弊風險','G',2.55,-1.36],
    ['風險管理機制不足','G',2.45,-1.45],
    ['違反法規','G',2.55,-1.55],
    ['供應鏈管理失當','G',2.45,-1.45],
    ['資安管理失當','G',2.36,-1.36],
    ['提升氣候變遷調適與減碳轉型能力','E',2.36,2.45],
    ['導入能源管理與低碳能源','E',2.45,2.64],
    ['提升水資源管理效率','E',2.27,2.64],
    ['導入綠色採購與永續原料來源','E',2.45,2.55],
    ['開發綠色永續商品','E',2.27,2.55],
    ['循環經濟與資源再利用','E',2.27,2.45],
    ['保護生物多樣性','E',1.91,2.18],
    ['推動包裝減量與減塑','E',2.18,2.09],
    ['碳排及氣候風險管理不足','E',2.27,-1.64],
    ['能源使用效率不佳或轉型不足','E',2.27,-1.73],
    ['空氣污染排放未符合規範','E',2.45,-1.82],
    ['水資源管理不當','E',2.36,-1.64],
    ['廢棄物處理不當','E',2.36,-1.64],
    ['提升員工薪酬福利與照顧','S',2.64,2.45],
    ['強化人才招募、留任與發展','S',2.55,2.45],
    ['強化職業安全與健康管理','S',2.91,2.91],
    ['促進職場性別平等與多元性','S',2.36,2.45],
    ['深化社會參與在地關懷','S',2.18,2.18],
    ['消費者健康與安全','S',3.00,2.91],
    ['產品品質與產品責任','S',3.00,2.91],
    ['發生職業災害風險','S',2.45,-1.64],
  ];
  const ws = XLSX.utils.aoa_to_sheet([headers, ...sample]);
  ws['!cols'] = [{wch:30},{wch:8},{wch:12},{wch:28}];
  XLSX.utils.book_append_sheet(wb, ws, 'Materiality Data');
  XLSX.writeFile(wb, '重大性矩陣_範本.xlsx');
}

// ── Drag & drop ───────────────────────────────────────────────────────────────
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

function handleFile(input) {
  if (input.files[0]) processFile(input.files[0]);
}

function processFile(file) {
  showError('');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});

      // Validate
      if (rows.length < 2) throw new Error('檔案內容為空');
      const header = rows[0].map(h => String(h).trim());
      const required = ['議題','面向','衝擊程度','發生機率'];
      const missing = required.filter(r => !header.includes(r));
      if (missing.length) throw new Error(`缺少欄位：${missing.join('、')}`);

      const iIssue  = header.indexOf('議題');
      const iCat    = header.indexOf('面向');
      const iImpact = header.indexOf('衝擊程度');
      const iProb   = header.indexOf('發生機率');

      const data = [];
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r[iIssue]) continue;
        const cat = String(r[iCat]).trim().toUpperCase();
        if (!['G','E','S'].includes(cat)) throw new Error(`第 ${i+1} 列「面向」欄位值無效（應為 G、E 或 S）：${r[iCat]}`);
        const impact = parseFloat(r[iImpact]);
        const prob   = parseFloat(r[iProb]);
        if (isNaN(impact) || isNaN(prob)) throw new Error(`第 ${i+1} 列數值格式錯誤`);
        data.push({ num: data.length+1, name: String(r[iIssue]).trim(), cat, impact, prob });
      }
      if (data.length !== 30) throw new Error(`資料筆數應為 30 筆，目前為 ${data.length} 筆`);

      parsedData = data;
      zone.classList.add('has-file');
      const fn = document.getElementById('fileName');
      fn.style.display = 'block';
      fn.textContent = '✓ ' + file.name;
      document.getElementById('generateBtn').disabled = false;
      setStep(2);
    } catch(err) {
      showError(err.message);
      parsedData = null;
      document.getElementById('generateBtn').disabled = true;
    }
  };
  reader.readAsArrayBuffer(file);
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  if (msg) { box.style.display = 'block'; box.textContent = '⚠️ ' + msg; }
  else { box.style.display = 'none'; }
}

// ── Step indicator ────────────────────────────────────────────────────────────
function setStep(active) {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('step'+i);
    el.classList.remove('active','done');
    if (i < active) el.classList.add('done');
    else if (i === active) el.classList.add('active');
  }
}

// ── Chart drawing ─────────────────────────────────────────────────────────────
const COLOR  = {G:'#4472C4', E:'#70AD47', S:'#ED7D31'};
const BG_NEG = '#FAF0E6';
const BG_POS = '#F0F0F0';

// Chart coordinate config
const CFG = {
  W: 1800, H: 980,       // canvas px
  PAD_L: 70, PAD_R: 340, // right panel width = 340
  PAD_T: 60, PAD_B: 70,
  X_MIN: -2.2, X_MAX: 3.4,
  Y_MIN: 1.5,  Y_MAX: 3.3,
};

function dataToCanvas(x, y) {
  const plotW = CFG.W - CFG.PAD_L - CFG.PAD_R;
  const plotH = CFG.H - CFG.PAD_T - CFG.PAD_B;
  const cx = CFG.PAD_L + (x - CFG.X_MIN) / (CFG.X_MAX - CFG.X_MIN) * plotW;
  const cy = CFG.PAD_T + (1 - (y - CFG.Y_MIN) / (CFG.Y_MAX - CFG.Y_MIN)) * plotH;
  return [cx, cy];
}

function generateChart() {
  if (!parsedData) return;
  setStep(3);

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('generateLabel').textContent = '產生中…';

  setTimeout(() => {
    drawMatrix(parsedData);
    btn.disabled = false;
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('generateLabel').textContent = '重新產生';
    btn.disabled = false;
    document.getElementById('result-section').style.display = 'block';
    document.getElementById('resultMeta').textContent = `共 ${parsedData.length} 個議題`;
    document.getElementById('result-section').scrollIntoView({behavior:'smooth', block:'start'});
    setStep(4);
  }, 100);
}

function drawMatrix(data) {
  const canvas = document.getElementById('matrixCanvas');
  canvas.width  = CFG.W;
  canvas.height = CFG.H;
  const ctx = canvas.getContext('2d');

  const plotW = CFG.W - CFG.PAD_L - CFG.PAD_R;
  const plotH = CFG.H - CFG.PAD_T - CFG.PAD_B;
  const [x0] = dataToCanvas(0, CFG.Y_MIN); // vertical divider x

  // Background
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, CFG.W, CFG.H);

  // Left (negative) background
  ctx.fillStyle = BG_NEG;
  ctx.fillRect(CFG.PAD_L, CFG.PAD_T, x0 - CFG.PAD_L, plotH);

  // Right (positive) background
  ctx.fillStyle = BG_POS;
  ctx.fillRect(x0, CFG.PAD_T, CFG.PAD_L + plotW - x0, plotH);

  // Grid lines
  ctx.strokeStyle = '#DDDDDD';
  ctx.lineWidth = 0.8;
  for (let v = Math.ceil(CFG.Y_MIN*2)/2; v <= CFG.Y_MAX; v += 0.5) {
    const [, cy] = dataToCanvas(0, v);
    ctx.beginPath(); ctx.moveTo(CFG.PAD_L, cy); ctx.lineTo(CFG.PAD_L+plotW, cy); ctx.stroke();
  }
  for (let v = Math.ceil(CFG.X_MIN*2)/2; v <= CFG.X_MAX; v += 0.5) {
    const [cx] = dataToCanvas(v, 0);
    ctx.beginPath(); ctx.moveTo(cx, CFG.PAD_T); ctx.lineTo(cx, CFG.PAD_T+plotH); ctx.stroke();
  }

  // Vertical divider
  ctx.strokeStyle = '#AAAAAA';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x0, CFG.PAD_T); ctx.lineTo(x0, CFG.PAD_T+plotH); ctx.stroke();

  // Axes box
  ctx.strokeStyle = '#BBBBBB';
  ctx.lineWidth = 1;
  ctx.strokeRect(CFG.PAD_L, CFG.PAD_T, plotW, plotH);

  // X-axis labels
  ctx.fillStyle = '#555555';
  ctx.font = '500 24px "Noto Sans TC", sans-serif';
  ctx.textAlign = 'center';
  const xTickLabels = [[-2.0,'高'],[-1.0,'中'],[0,'低'],[0,'低'],[1.0,'低'],[2.0,'中'],[3.0,'高']];
  // Negative side
  [[-2.0,'高'],[-1.5,''],[-1.0,'中'],[-0.5,'']].forEach(([v,lbl]) => {
    const [cx] = dataToCanvas(v, 0);
    if (lbl) { ctx.fillText(lbl, cx, CFG.PAD_T+plotH+38); }
  });
  // Positive side
  [[0.5,''],[1.0,'低'],[1.5,''],[2.0,'中'],[2.5,''],[3.0,'高']].forEach(([v,lbl]) => {
    const [cx] = dataToCanvas(v, 0);
    if (lbl) { ctx.fillText(lbl, cx, CFG.PAD_T+plotH+38); }
  });
  // "低" at center
  const [cx0] = dataToCanvas(-0.5, 0);
  ctx.fillText('低', cx0, CFG.PAD_T+plotH+38);

  // Y-axis labels
  ctx.textAlign = 'left';
  ctx.font = '400 22px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#AAAAAA';
  [[3.0,'大'],[2.5,'中'],[2.0,'小']].forEach(([v,lbl]) => {
    const [, cy] = dataToCanvas(0, v);
    ctx.fillText(lbl, CFG.PAD_L+6, cy+8);
  });

  // Axis titles
  ctx.fillStyle = '#222222';
  ctx.font = 'bold 26px "Noto Sans TC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('發生機率', CFG.PAD_L + plotW/2, CFG.H - 14);

  ctx.save();
  ctx.translate(22, CFG.PAD_T + plotH/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('衝擊程度', 0, 0);
  ctx.restore();

  // 負面 / 正面 labels
  ctx.font = 'bold 26px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#777777';
  ctx.textAlign = 'center';
  const negMid = (CFG.PAD_L + x0) / 2;
  const posMid = (x0 + CFG.PAD_L + plotW) / 2;
  ctx.fillText('負面', negMid, CFG.PAD_T + plotH - 14);
  ctx.fillText('正面', posMid, CFG.PAD_T + plotH - 14);

  // Chart title
  ctx.fillStyle = '#111111';
  ctx.font = 'bold 34px "DM Serif Display", "Noto Sans TC", serif';
  ctx.textAlign = 'left';
  ctx.fillText('重大性矩陣圖', CFG.PAD_L, CFG.PAD_T - 18);

  // ── Detect overlapping points ──────────────────────────────────────────────
  const groups = {};
  data.forEach(d => {
    const key = `${d.prob.toFixed(4)},${d.impact.toFixed(4)}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(d.num);
  });
  const overlapSet = new Set();
  const overlapGroups = [];
  Object.values(groups).forEach(nums => {
    if (nums.length > 1) {
      nums.forEach(n => overlapSet.add(n));
      overlapGroups.push(nums);
    }
  });

  // Pre-compute label positions for overlapping points
  // Spread them in opposite directions
  const overlapOffsets = {};
  overlapGroups.forEach(nums => {
    const d0 = data.find(d => d.num === nums[0]);
    const [px, py] = dataToCanvas(d0.prob, d0.impact);
    const dirs = [
      [-55, -45], [55, 45], [-50, 50], [50, -50],
      [0, -60], [0, 60], [-60, 0], [60, 0]
    ];
    nums.forEach((n, i) => {
      const [dx, dy] = dirs[i % dirs.length];
      overlapOffsets[n] = [px + dx, py + dy];
    });
  });

  // ── Draw points & labels ───────────────────────────────────────────────────
  data.forEach(d => {
    const [px, py] = dataToCanvas(d.prob, d.impact);
    const col = COLOR[d.cat];

    // Draw marker
    ctx.save();
    ctx.fillStyle = col;
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 2;

    if (d.cat === 'G') {
      ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    } else if (d.cat === 'E') {
      // Diamond
      ctx.beginPath();
      ctx.moveTo(px, py-11); ctx.lineTo(px+11, py); ctx.lineTo(px, py+11); ctx.lineTo(px-11, py);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else {
      // Triangle
      ctx.beginPath();
      ctx.moveTo(px, py-12); ctx.lineTo(px+11, py+8); ctx.lineTo(px-11, py+8);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    ctx.restore();

    // Label
    const isOverlap = overlapSet.has(d.num);
    let lx, ly;

    if (isOverlap) {
      [lx, ly] = overlapOffsets[d.num];

      // Draw leader line
      ctx.save();
      ctx.strokeStyle = '#AAAAAA';
      ctx.lineWidth = 1.2;
      ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(lx, ly); ctx.stroke();
      ctx.restore();
    } else {
      lx = px + 8;
      ly = py - 8;
    }

    // Number badge
    const label = String(d.num);
    ctx.font = 'bold 17px "Noto Sans TC", sans-serif';
    const tw = ctx.measureText(label).width;
    const bw = tw + 12, bh = 22;
    const bx = lx - (isOverlap ? bw/2 : 0);
    const by = ly - (isOverlap ? bh/2 : bh);

    // Badge bg
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    roundRect(ctx, bx, by, bw, bh, 4);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = '#222222';
    ctx.textAlign = 'center';
    ctx.fillText(label, bx + bw/2, by + bh - 5);
    ctx.restore();
  });

  // ── Right panel: reference table ──────────────────────────────────────────
  const panelX = CFG.W - CFG.PAD_R + 16;
  const panelW = CFG.PAD_R - 24;
  const panelY = CFG.PAD_T;
  const panelH = plotH;

  // Panel title
  ctx.fillStyle = '#222222';
  ctx.font = 'bold 22px "Noto Sans TC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('議題編號對照表', panelX + panelW/2, panelY - 10);

  // Two columns
  const colW = panelW / 2;
  const ROW_H = panelH / 17;
  const FONT_SIZE = Math.min(15, ROW_H * 0.48);

  function drawRefRows(rows, baseX) {
    rows.forEach((d, i) => {
      const ry = panelY + ROW_H * (i + 1);
      // Row bg
      ctx.fillStyle = i % 2 === 0 ? '#F7F7F7' : '#FFFFFF';
      ctx.fillRect(baseX, ry, colW - 4, ROW_H);

      // Number
      ctx.font = `bold ${FONT_SIZE}px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = COLOR[d.cat];
      ctx.textAlign = 'left';
      ctx.fillText(String(d.num).padStart(2,'0'), baseX + 4, ry + ROW_H*0.68);

      // Category dot
      ctx.fillStyle = COLOR[d.cat];
      ctx.beginPath();
      ctx.arc(baseX + 32, ry + ROW_H*0.5, 4, 0, Math.PI*2);
      ctx.fill();

      // Name
      ctx.fillStyle = '#333333';
      ctx.font = `${FONT_SIZE}px "Noto Sans TC", sans-serif`;
      const maxW = colW - 44;
      let name = d.name;
      while (ctx.measureText(name).width > maxW && name.length > 2) {
        name = name.slice(0, -1);
      }
      if (name !== d.name) name = name.slice(0,-1) + '…';
      ctx.fillText(name, baseX + 40, ry + ROW_H*0.68);
    });
  }

  // Column header
  ctx.fillStyle = '#2F4F7F';
  ctx.fillRect(panelX, panelY, colW - 4, ROW_H);
  ctx.fillRect(panelX + colW, panelY, colW - 4, ROW_H);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${FONT_SIZE}px "Noto Sans TC", sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('編號　議題', panelX + colW/2, panelY + ROW_H*0.68);
  ctx.fillText('編號　議題', panelX + colW + colW/2, panelY + ROW_H*0.68);

  drawRefRows(data.slice(0, 15),  panelX);
  drawRefRows(data.slice(15, 30), panelX + colW);

  // Legend at bottom of panel
  const legendY = panelY + ROW_H * 17 + 10;
  const legendItems = [['G','治理/經濟'],['E','環境'],['S','社會']];
  ctx.font = `500 18px "Noto Sans TC", sans-serif`;
  ctx.textAlign = 'left';
  let lx2 = panelX;
  legendItems.forEach(([cat, label]) => {
    ctx.fillStyle = COLOR[cat];
    ctx.beginPath(); ctx.arc(lx2+8, legendY+9, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#555555';
    ctx.fillText(label, lx2+18, legendY+15);
    lx2 += ctx.measureText(label).width + 50;
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ── Download PNG ──────────────────────────────────────────────────────────────
function downloadPNG() {
  const canvas = document.getElementById('matrixCanvas');
  const link = document.createElement('a');
  link.download = '重大性矩陣圖.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
